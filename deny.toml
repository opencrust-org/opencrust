[advisories]
version = 2
yanked = "warn"
ignore = [
    # rustls-webpki vulnerability — transitive dep from multiple crates
    "RUSTSEC-2026-0049", # rustls-webpki: Improper validation of OCSP responses
    # Unmaintained transitive deps — no direct replacements available
    "RUSTSEC-2025-0069", # daemonize (direct dep, no maintained alternative)
    "RUSTSEC-2024-0388", # derivative (transitive via poise/serenity)
    "RUSTSEC-2024-0384", # instant (transitive via notify)
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained (transitive via rumqttc, no safe upgrade)
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"

[[licenses.clarify.license-files]]
path = "LICENSE"
hash = 3171871267

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
