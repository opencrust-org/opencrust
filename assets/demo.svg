<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="720" height="680" viewBox="0 0 720 680">
  <defs>
    <style>
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      .cursor { animation: blink 0.6s step-end infinite; }
    </style>
  </defs>

  <!-- background -->
  <rect width="720" height="680" fill="#090c14" rx="12"/>
  <rect x="8" y="8" width="704" height="664" rx="10" fill="#0d1117" stroke="#21262d" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="8" y="8" width="704" height="34" rx="10" fill="#161b22"/>
  <rect x="8" y="30" width="704" height="12" fill="#161b22"/>
  <circle cx="30" cy="25" r="6" fill="#ff5f57"/>
  <circle cx="50" cy="25" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="25" r="6" fill="#28c840"/>
  <text x="360" y="30" text-anchor="middle"
        font-family="'Courier New',monospace" font-size="12" fill="#8b949e">opencrust — chat</text>

  <!-- banner via foreignObject -->
  <foreignObject x="24" y="48" width="430" height="234">
    <body xmlns="http://www.w3.org/1999/xhtml">
      <pre style="margin:0;padding:0;font-family:'Courier New',Courier,monospace;font-size:13px;line-height:18px;color:#c9d1d9;background:transparent;white-space:pre;">&#x256D;&#x2500;&#x2500;&#x2500; OpenCrust Chat v0.2.9 &#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x256E;
&#x2502;                                                &#x2502;
&#x2502;         _~^~^~_                                &#x2502;
&#x2502;     \) /  o o  \ (/                            &#x2502;
&#x2502;       '_   -   _'                              &#x2502;
&#x2502;       / '-----' \                              &#x2502;
&#x2502;                                                &#x2502;
&#x2502;   <span style="color:#79c0ff">Gateway</span>  http://127.0.0.1:3888               &#x2502;
&#x2502;   <span style="color:#56d364">Agent</span>    default                             &#x2502;
&#x2502;                                                &#x2502;
&#x2502;   Type /help for commands                      &#x2502;
&#x2502;                                                &#x2502;
&#x2570;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x2500;&#x256F;</pre>
    </body>
  </foreignObject>

  <!-- Q1: you prompt -->
  <text x="24" y="303" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.5s" fill="freeze"/>
    you &#x203A;
  </text>
  <text x="76" y="303" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3.3s" fill="freeze"/>
    what's the difference between Go channels and Rust async?
  </text>
  <rect x="76" y="290" width="8" height="14" fill="#79c0ff" class="cursor">
    <animate attributeName="x" from="76" to="693" dur="1.8s" begin="1.5s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.05s" begin="3.3s" fill="freeze"/>
  </rect>

  <!-- Bot response 1 -->
  <g font-family="'Courier New',monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
    <text x="24"  y="324" fill="#56d364">bot &#x203A;</text>
    <text x="76"  y="324" fill="#ffffff">Go channels are built into the language &#x2014; goroutines communicate</text>
    <text x="76"  y="341" fill="#ffffff">by passing values through typed channels (make(chan int, 5)).</text>
    <text x="76"  y="358" fill="#ffffff">Rust async uses Future + tokio::sync::mpsc for similar patterns,</text>
    <text x="76"  y="375" fill="#ffffff">but ownership is enforced at compile time, so data races are</text>
    <text x="76"  y="392" fill="#ffffff">impossible without unsafe.</text>
  </g>

  <!-- Q2: /agent coder -->
  <text x="24" y="421" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="6.5s" fill="freeze"/>
    you &#x203A;
  </text>
  <text x="76" y="421" font-family="'Courier New',monospace" font-size="13" fill="#ffa657" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="7.2s" fill="freeze"/>
    /agent coder
  </text>
  <rect x="76" y="408" width="8" height="14" fill="#79c0ff" class="cursor">
    <animate attributeName="x" from="76" to="232" dur="0.7s" begin="6.5s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.05s" begin="7.2s" fill="freeze"/>
  </rect>

  <!-- Switched -->
  <text x="24" y="438" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="7.4s" fill="freeze"/>
    Switched to agent: coder.
  </text>

  <!-- Q3: show me rust mpsc -->
  <text x="24" y="463" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="8.8s" fill="freeze"/>
    you &#x203A;
  </text>
  <text x="76" y="463" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="9.9s" fill="freeze"/>
    show me a rust mpsc example
  </text>
  <rect x="76" y="450" width="8" height="14" fill="#79c0ff" class="cursor">
    <animate attributeName="x" from="76" to="432" dur="1.1s" begin="8.8s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.05s" begin="9.9s" fill="freeze"/>
  </rect>

  <!-- Bot response 2: code -->
  <g font-family="'Courier New',monospace" font-size="13" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="10.2s" fill="freeze"/>
    <text x="24" y="484" fill="#56d364">bot &#x203A;</text>
    <text x="76" y="484"><tspan fill="#ff7b72">use</tspan><tspan fill="#ffffff"> tokio::sync::</tspan><tspan fill="#79c0ff">mpsc</tspan><tspan fill="#ffffff">;</tspan></text>
    <text x="76" y="507" fill="#d2a8ff">#[tokio::main]</text>
    <text x="76" y="524"><tspan fill="#ff7b72">async fn</tspan><tspan fill="#79c0ff"> main</tspan><tspan fill="#ffffff">() {</tspan></text>
    <text x="76" y="541"><tspan fill="#ffffff">    </tspan><tspan fill="#ff7b72">let</tspan><tspan fill="#ffffff"> (tx, </tspan><tspan fill="#ff7b72">mut</tspan><tspan fill="#ffffff"> rx) = mpsc::</tspan><tspan fill="#79c0ff">channel</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#d2a8ff">8</tspan><tspan fill="#ffffff">);</tspan></text>
    <text x="76" y="558"><tspan fill="#ffffff">    tokio::</tspan><tspan fill="#79c0ff">spawn</tspan><tspan fill="#ff7b72">(async move</tspan><tspan fill="#ffffff"> { tx.</tspan><tspan fill="#79c0ff">send</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#d2a8ff">42</tspan><tspan fill="#ffffff">).await.</tspan><tspan fill="#79c0ff">unwrap</tspan><tspan fill="#ffffff">(); });</tspan></text>
    <text x="76" y="575"><tspan fill="#ffffff">    </tspan><tspan fill="#79c0ff">println!</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#a5d6ff">"{}"</tspan><tspan fill="#ffffff">, rx.</tspan><tspan fill="#79c0ff">recv</tspan><tspan fill="#ffffff">().await.</tspan><tspan fill="#79c0ff">unwrap</tspan><tspan fill="#ffffff">()); </tspan><tspan fill="#8b949e">// 42</tspan></text>
    <text x="76" y="592" fill="#ffffff">}</text>
  </g>

  <!-- Q4: /exit -->
  <text x="24" y="617" font-family="'Courier New',monospace" font-size="13" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="13.2s" fill="freeze"/>
    you &#x203A;
  </text>
  <text x="76" y="617" font-family="'Courier New',monospace" font-size="13" fill="#ffa657" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="13.7s" fill="freeze"/>
    /exit
  </text>
  <rect x="76" y="604" width="8" height="14" fill="#79c0ff" class="cursor">
    <animate attributeName="x" from="76" to="148" dur="0.5s" begin="13.2s" fill="freeze"/>
    <animate attributeName="opacity" from="1" to="0" dur="0.05s" begin="13.7s" fill="freeze"/>
  </rect>

  <!-- Goodbye -->
  <text x="24" y="638" font-family="'Courier New',monospace" font-size="13" fill="#56d364" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="13.9s" fill="freeze"/>
    Goodbye!
  </text>
</svg>
